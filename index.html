<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Prompteo — Prompteur à reconnaissance vocale pour tournage vidéo.">
  <title>Prompteo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ─── Panneau de contrôle ─── -->
  <aside id="control-panel" class="panel-visible">

    <header class="panel-header">
      <h1 class="panel-title">Prompteo</h1>
      <button id="btn-toggle-panel" class="btn-icon" aria-label="Masquer le panneau" title="Masquer / Afficher le panneau">
        <svg id="icon-collapse" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        <svg id="icon-expand" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </header>

    <div class="panel-body">
      <label for="script-input" class="label">Colle ton script ici :</label>
      <textarea id="script-input" class="textarea" rows="10" placeholder="Bonjour et bienvenue dans cette nouvelle vidéo…"></textarea>

      <div class="controls-row">
        <button id="btn-load" class="btn btn-secondary">Charger</button>
        <button id="btn-start" class="btn btn-primary" disabled>▶ Start</button>
        <button id="btn-reset" class="btn btn-danger" disabled>⟲ Reset</button>
      </div>

      <div class="slider-group">
        <label for="font-slider" class="label">Taille du texte : <span id="font-size-value">4</span>rem</label>
        <input type="range" id="font-slider" min="2" max="8" step="0.25" value="4">
      </div>

      <div class="slider-group">
        <label for="tolerance-slider" class="label">Tolérance fuzzy : <span id="tolerance-value">0.55</span></label>
        <input type="range" id="tolerance-slider" min="0.3" max="0.9" step="0.05" value="0.55">
      </div>

      <div id="debug-bar" class="debug-bar">
        <span class="debug-label">API entend :</span>
        <span id="debug-heard" class="debug-text">—</span>
      </div>
    </div>
  </aside>

  <!-- ─── Bouton flottant pour ré-ouvrir le panneau ─── -->
  <button id="btn-show-panel" class="btn-float" style="display:none" aria-label="Afficher le panneau">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <!-- ─── Zone du prompteur ─── -->
  <main id="teleprompter" class="teleprompter">
    <div id="prompt-text" class="prompt-text">
      <p class="placeholder-msg">← Colle ton script et clique sur <strong>Charger</strong></p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
